name: baby_corn
description: An Indian-focused newborn baby tracking and parenting companion app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Routing
  go_router: ^17.2.3
  
  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.2
  firebase_app_check: ^0.4.4+1
  
  # Local Storage & Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.3.0
  
  # Security & Biometrics
  local_auth: ^2.3.0
  flutter_windowmanager_plus: ^1.0.1
  
  # Utility
  intl: ^0.20.2
  connectivity_plus: ^7.1.1
  uuid: ^4.3.3
  cached_network_image: ^3.3.0
  image_picker: ^1.0.4
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  flutter_local_notifications: ^21.0.0
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  path_provider: ^2.1.1
  
  # UI/UX Additions
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  gap: ^3.0.1
  flutter_svg: ^2.0.9
  flutter_animate: ^4.5.2
  glassmorphism: ^3.0.0
  shared_preferences: ^2.5.5
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  flutter_contacts: ^2.2.0
  url_launcher: ^6.3.2
  home_widget: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FDFBF7"
  adaptive_icon_foreground: "assets/images/logo.png"
